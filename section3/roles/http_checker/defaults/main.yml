http_checker_image_repository: imm174/http-checker
http_checker_image_tag: "1.0.0"
http_checker_image_pull: true

http_checker_container_name: http-checker
http_checker_status_codes:
  - 100
  - 200
  - 301
  - 404
  - 500

http_checker_wait_retries: 30
http_checker_wait_delay: 2

http_checker_remove_after_run: false
