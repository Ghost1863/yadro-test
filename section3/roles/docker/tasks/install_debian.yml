- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
  register: docker_apt_refresh
  retries: 3
  delay: 5
  until: docker_apt_refresh is succeeded
  tags: [pkg]

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  register: docker_prereq_install
  retries: 3
  delay: 5
  until: docker_prereq_install is succeeded
  tags: [pkg]

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: "{{ docker_apt_keyring_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [gpg, repo]

- name: Install Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_key_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    checksum: "{{ docker_apt_gpg_key_checksum | default('', true) | ternary(docker_apt_gpg_key_checksum, omit) }}"
    owner: root
    group: root
    mode: "0644"
    force: false
  register: docker_gpg_key
  retries: 3
  delay: 5
  until: docker_gpg_key is succeeded
  tags: [gpg, repo]

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_keyring_path }}]
      {{ docker_apt_repository_url }} {{ ansible_facts['distribution_release'] }}
      {{ docker_apt_release_channel }}
    state: present
    filename: docker
    update_cache: true
  register: docker_repo_add
  retries: 3
  delay: 5
  until: docker_repo_add is succeeded
  tags: [repo]

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  register: docker_engine_install
  retries: 3
  delay: 5
  until: docker_engine_install is succeeded
  notify: Restart docker
  tags: [pkg]

- name: Install Python Docker SDK for Ansible community.docker modules
  ansible.builtin.apt:
    name:
      - python3-docker
      - python3-requests
    state: present
  register: docker_sdk_install
  retries: 3
  delay: 5
  until: docker_sdk_install is succeeded
  tags: [pkg]

- name: Ensure docker service is started and enabled
  ansible.builtin.systemd_service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"
  tags: [service]

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  tags: [users]

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0
  tags: [users]

- name: Verify docker installation
  ansible.builtin.command:
    argv:
      - docker
      - --version
  register: docker_version_result
  changed_when: false
  tags: [verify]

- name: Show docker version
  ansible.builtin.debug:
    msg: "{{ docker_version_result.stdout }}"
  tags: [verify]
