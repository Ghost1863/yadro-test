docker_users: []

docker_apt_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}"
docker_apt_release_channel: stable
docker_apt_repository_url: https://download.docker.com/linux/ubuntu
docker_apt_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_apt_keyring_path: /etc/apt/keyrings/docker.asc

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service_state: started
docker_service_enabled: true
