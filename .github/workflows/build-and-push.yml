name: build-and-push

on:
  push:
    branches: [master]
    paths:
      - "section1/**"
      - "section2/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

env:
  IMAGE: imm174/http-checker
  TAG: "1.0.0"

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Build (no push)
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: section2/Dockerfile
          push: false
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: imm174
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: section2/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
